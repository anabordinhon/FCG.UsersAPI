name: Deploy Microservice to EC2

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. Baixa o código
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Login no Docker Hub
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 3. Build e Push da Imagem (Agora gerando as duas tags)
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: ./FCG.Users/FCG.Users.API
        file: ./FCG.Users/FCG.Users.API/Dockerfile
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/user-api-image:latest
          ${{ secrets.DOCKER_USERNAME }}/user-api-image:migrations

    # 4. Conecta via SSH e roda o compose
    - name: Deploy via SSH
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          # Vai para a pasta onde você criou o docker-compose.yml e o .env
          cd /home/ubuntu
          
          # 1. Baixa as imagens usando a sintaxe V1 (com hífen)
          docker-compose pull usersapi usersapi-migration
          
          # 2. Sobe a API e deixa o compose resolver RabbitMQ e Migrations
          docker-compose up -d usersapi
          
          # 3. Limpa imagens antigas para não lotar o disco
          docker image prune -f
