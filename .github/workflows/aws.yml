name: Deploy Microservice to EC2

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. Baixa o código
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Login no Docker Hub
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 3. Build e Push da Imagem
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        # AQUI: O nome da imagem no Docker Hub
        # Ex: anaarquiteta/pagamentos-api:latest
        tags: ${{ secrets.DOCKER_USERNAME }}/user-api-image:latest

    # 4. Conecta via SSH e atualiza APENAS este serviço
    - name: Deploy via SSH
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          # 1. Entra na pasta onde criamos o docker-compose.yml central
          cd /home/ubuntu/app
          
          # 2. Garante que temos a versão mais recente da imagem deste serviço
          # Substitua 'nome-do-servico' pelo nome EXATO que está no docker-compose.yml sob 'services:'
          docker compose pull usersapi
          
          # 3. Recria apenas o container deste serviço
          # --no-deps: Não reinicia serviços dependentes (como o banco)
          # -d: Roda em background
          docker compose up -d --no-deps usersapi
          
          # 4. Limpa imagens antigas para economizar espaço
          docker image prune -f
