name: Deploy Microservice to EC2

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./FCG.Users
          file: ./FCG.Users/FCG.Users.API/Dockerfile
          target: runtime
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/user-api-image:latest

      - name: Build and push Migrations image
        uses: docker/build-push-action@v5
        with:
          context: ./FCG.Users
          file: ./FCG.Users/FCG.Users.API/Dockerfile
          target: migrations
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/user-api-image:migrations

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /home/ubuntu

            docker compose pull usersapi usersapi-migration
            docker compose up -d usersapi
            docker compose ps
            docker image prune -f
