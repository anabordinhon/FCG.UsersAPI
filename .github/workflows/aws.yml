name: Deploy Microservice to EC2
on:
  push:
    branches: [ "main" ]
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    # 1. Baixa o código
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Login no Docker Hub
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 3. Build e Push da imagem da API (estágio runtime)
    - name: Build and push API image
      uses: docker/build-push-action@v5
      with:
        context: ./FCG.Users
        file: ./FCG.Users/FCG.Users.API/Dockerfile
        target: runtime
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/user-api-image:latest

    # 4. Build e Push da imagem de Migrations (estágio migrations)
    - name: Build and push Migrations image
      uses: docker/build-push-action@v5
      with:
        context: ./FCG.Users
        file: ./FCG.Users/FCG.Users.API/Dockerfile
        target: migrations
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/user-api-image:migrations

    # 4. Conecta via SSH e roda o compose
    - name: Deploy via SSH
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          cd /home/ubuntu

          # 1. Baixa as imagens usando a sintaxe V2 (sem hífen) ✅
          docker compose pull usersapi usersapi-migration

          # 2. Sobe a API e deixa o compose resolver RabbitMQ e Migrations
          docker compose up -d usersapi

          # 3. Limpa imagens antigas para não lotar o disco
          docker image prune -f
